[tasks.install]
run = []


[tasks."install/playwright"]
run = "bun run playwright install chromium --with-deps"
# NOTE: It prompts for sudo to install OS dependencies
raw = true

[tasks.clean]
run = "rm -rf .alumnium dist"

[tasks."clear/cache"]
description = "Clears TypeScript package Alumnium LLM cache."
run = "rm -rf ./.alumnium/cache"

[tasks.build]
run = "./scripts/build.ts"
description = "Build CLI bins, core npm and CLI pip packages"
depends = ["build/generate"]
sources = [
  "src/**/*",
  "scripts/build.ts",
  "package.json",
  "tsconfig.json",
  "tsconfig.build.json",
  "*.md",
]
outputs = ["dist/**/*"]

[tasks."build/generate"]
run = { task = "build/generate:bundles" }

[tasks."build/generate:bundles"]
run = "./scripts/generate-bundles.ts | xargs oxfmt"
description = "Generates code bundles to enable building single-file executable"
sources = [
  "scripts/generate-bundles.ts",
  # TODO: Move prompts generation into the script
  "src/server/agents/prompts/prompts.ts",
  "src/drivers/scripts/*.js",
  "src/server/agents/prompts/**/*.md",
]
outputs = [
  "src/server/agents/prompts/bundledPrompts.ts",
  "src/drivers/scripts/bundledScripts.ts",
]

[tasks.publish]
run = "./scripts/publish.sh"
depends = "build"

[tasks."dev/cli"]
run = "fnox exec  -- bun ./src/cli/bin.ts"
quiet = true
raw = true

[tasks."dev/server"]
run = "fnox exec  -- bun ./src/cli/bin.ts server"
quiet = true
raw = true

[tasks."dev/mcp"]
run = "fnox exec  -- bun ./src/cli/bin.ts mcp"
quiet = true
raw = true

[tasks."dev/mcp:inspect"]
run = "fnox exec  -- ALUMNIUM_LOG_FILENAME=mcp-inspect.log bunx @modelcontextprotocol/inspector bun ./src/cli/bin.ts mcp"

[tasks.test]
run = [{ task = "test/unit" }, { task = "test/system:all" }]

[tasks."test/unit"]
run = "bun vitest --project unit run"

[tasks."test/unit:watch"]
run = "bun vitest --project unit"

[tasks."test/unit:coverage"]
run = "bun vitest --project unit --coverage --coverage.reportsDirectory tests/artifacts/coverage/ run"

[tasks."test/system"]
usage = '''
arg "<driver>" help="Driver to use for system tests" {
  choices "selenium" "playwright" "appium-ios" "appium-android"
  default "selenium"
}
'''
run = "ALUMNIUM_DRIVER={{usage.driver}} ./scripts/test-system.sh"

[tasks."test/system:all"]
run = [
  { task = "test/system:selenium" },
  { task = "test/system:playwright" },
  { task = "test/system:appium-ios" },
  { task = "test/system:appium-android" },
]

[tasks."test/system:selenium"]
run = [{ task = "test/system selenium" }]

[tasks."test/system:playwright"]
run = [{ task = "test/system playwright" }]

[tasks."test/system:appium-ios"]
run = [{ task = "test/system appium-ios" }]

[tasks."test/system:appium-android"]
run = [{ task = "test/system appium-android" }]

[tasks."test/waiter"]
usage = '''
arg "<driver>" help="Driver to use for waiter tests" {
  choices "selenium" "playwright"
  default "selenium"
}
'''
run = '''
ALUMNIUM_DRIVER={{usage.driver}} \
ALUMNIUM_TEST_VITEST_ARGS="tests/system/waiter.test.ts" \
./scripts/test-system.sh
'''

[tasks."test/waiter:selenium"]
run = [{ task = "test/waiter selenium" }]

[tasks."test/waiter:playwright"]
run = [{ task = "test/waiter playwright" }]

[tasks."test/cache"]
description = "Run cache tests checking if Alumnium cache correctly generated for given model. It indirectly verified LangChain Zod schemas parsing."
usage = '''
arg "<model>" help="Model to use for cache tests" {
  default "azure_openai"
}
'''
run = '''
ALUMNIUM_DRIVER="playwright" \
ALUMNIUM_MODEL="{{usage.model}}" \
ALUMNIUM_TEST_VITEST_ARGS="-t addition tests/system/calculator.test.ts" \
ALUMNIUM_TEST_CACHE="true" \
./scripts/test-system.sh
'''

[tasks."test/cache:all"]
description = "Run cache tests for all models. See `test/cache` task for details."
# TODO: Some models aren't configured in the dev env. Add missing keys and env
# vars if applicable, then re-enable or remove commented cache tests below.
run = [
  # { task = "test/cache:azure_foundry" }, # Missing key
  { task = "test/cache:azure_openai" },
  { task = "test/cache:anthropic" },
  { task = "test/cache:aws_anthropic" },
  { task = "test/cache:aws_meta" },
  { task = "test/cache:deepseek" },
  # { task = "test/cache:github" }, # Not supported
  { task = "test/cache:google" },
  { task = "test/cache:mistralai" },
  # { task = "test/cache:ollama" }, # Fails
  # { task = "test/cache:openai" }, # Missing key
  { task = "test/cache:xai" },
]

[tasks."test/cache:azure_foundry"]
description = "Run cache tests for `azure_foundry` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["azure_foundry"] }

[tasks."test/cache:azure_openai"]
description = "Run cache tests for `azure_openai` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["azure_openai"] }

[tasks."test/cache:anthropic"]
description = "Run cache tests for `anthropic` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["anthropic"] }

[tasks."test/cache:aws_anthropic"]
description = "Run cache tests for `aws_anthropic` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["aws_anthropic"] }

[tasks."test/cache:aws_meta"]
description = "Run cache tests for `aws_meta` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["aws_meta"] }

[tasks."test/cache:deepseek"]
description = "Run cache tests for `deepseek` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["deepseek"] }

[tasks."test/cache:github"]
description = "Run cache tests for `github` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["github"] }

[tasks."test/cache:google"]
description = "Run cache tests for `google` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["google"] }

[tasks."test/cache:mistralai"]
description = "Run cache tests for `mistralai` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["mistralai"] }

[tasks."test/cache:ollama"]
description = "Run cache tests for `ollama` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["ollama"] }

[tasks."test/cache:openai"]
description = "Run cache tests for `openai` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["openai"] }

[tasks."test/cache:xai"]
description = "Run cache tests for `xai` model. See `test/cache` task for details."
run = { task = "test/cache", args = ["xai"] }

[tasks."test/package"]
run = "./scripts/test-package.sh"

[tasks.lint]
run = "bun oxlint ."

[tasks."lint:fix"]
run = "bun oxlint --fix ."

[tasks.format]
run = "bun oxfmt ."

[tasks."format:check"]
run = "bun oxfmt . --check"

[tasks.types]
depends = "//:types/ts"

[tasks."types:watch"]
depends = "//:types/ts:watch"

[tasks.version]
run = "./scripts/version.ts"
quiet = true
raw = true

[tasks."get-ollama-model"]
description = "Gets the current Ollama model id."
run = "./scripts/get-ollama-model.ts"
quiet = true
raw = true

[tasks."generate/types-scan-schema"]
description = "Generates Zod schema from .types-scan.json file produced by `scanTypes` function. See docs/contributing/scan-types.md for details."
usage = '''
arg "<types_scan_path>" help="Path to .types-scan.json file"
'''
run = "./scripts/generate-types-scan-schema.ts {{usage.types_scan_path}}"


[tasks."generate/types-scan-schema:class"]
description = "Generates Zod schema from .types-scan.json file produced by `scanTypes` function. See docs/contributing/scan-types.md for details."
usage = '''
arg "<types_scan_path>" help="Path to .types-scan.json file"
arg "<class_name>" help="Name of the class to enclose the generated schema in"
'''
run = "./scripts/generate-types-scan-schema.ts {{usage.types_scan_path}} --mode class --class-name {{usage.class_name}}"

[tasks."generate/lchain-schema"]
description = "Generates LchainSchema from scanned types. See docs/contributing/scan-types.md for details."
run = '''
mise :generate/types-scan-schema:class ./src/llm/Lchain.serialized.types-scan.json LchainSchema > ./src/llm/LchainSchema.ts
'''
