services:
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: alumnium-lgtm
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/main.json
    volumes:
      - ../.alumnium/telemetry:/data
      - ./provisioning/dashboards/main.json:/otel-lgtm/grafana/conf/provisioning/dashboards/custom/main.json:ro
      - ./provisioning/dashboards/provisioning.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom.yaml:ro
